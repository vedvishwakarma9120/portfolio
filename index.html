<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Ved — Portfolio OS</title>
<meta name="description" content="An interactive operating-system-style portfolio." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --void:#14131f;
  --surface:#1d1b2a;
  --surface-2:#252336;
  --line:rgba(255,255,255,.09);
  --text:#f1eee6;
  --text-dim:#a8a3bd;
  --amber:#f2a65a;
  --amber-dim:rgba(242,166,90,.18);
  --lavender:#9d8df1;
  --mint:#6fcf97;
  --sky:#5fb0e0;
  --coral:#e8866a;
  --danger:#e2604f;
  --taskbar-h:58px;
  --radius:16px;
  --font-display:'Space Mono', 'Courier New', monospace;
  --font-body:'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  --shadow-window: 0 24px 60px -12px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.03) inset;
}
html[data-theme="light"]{
  --void:#e9eaf2;
  --surface:#fbfbfd;
  --surface-2:#f1f1f8;
  --line:rgba(20,19,31,.1);
  --text:#1b1a26;
  --text-dim:#5e5c70;
  --shadow-window: 0 24px 50px -14px rgba(30,28,48,.25), 0 2px 0 rgba(255,255,255,.6) inset;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;}
body{
  font-family:var(--font-body);
  color:var(--text);
  background:var(--void);
  -webkit-font-smoothing:antialiased;
  position:fixed;
  inset:0;
}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;}
::selection{background:var(--amber-dim);}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px;}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

.hidden{display:none !important;}

/* ============================================================
   BOOT SCREEN
   ============================================================ */
#boot-screen{
  position:fixed;inset:0;z-index:3000;
  background:radial-gradient(circle at 50% 30%, #1c1a2c 0%, #100f19 70%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  color:#f1eee6;
  transition:opacity .6s ease, transform .6s ease;
}
#boot-screen.fade-out{opacity:0;transform:scale(1.03);pointer-events:none;}
.boot-logo{
  font-family:var(--font-display);
  font-weight:700;
  font-size:clamp(2.2rem,7vw,3.6rem);
  letter-spacing:.04em;
  display:flex;align-items:baseline;gap:.5rem;
}
.boot-logo .blip{
  width:.5em;height:.5em;border-radius:50%;
  background:var(--amber);
  box-shadow:0 0 22px 4px var(--amber);
  animation:blink 1.1s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.boot-sub{
  font-family:var(--font-display);
  color:var(--text-dim);
  font-size:.78rem;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-top:.6rem;
}
.boot-log{
  margin-top:2.6rem;
  width:min(420px,80vw);
  font-family:var(--font-display);
  font-size:.72rem;
  color:#6f6a87;
  height:108px;
  overflow:hidden;
  display:flex;flex-direction:column;gap:4px;
}
.boot-log div{opacity:0;transform:translateY(4px);animation:logIn .35s ease forwards;}
.boot-log .ok{color:var(--mint);margin-right:.5em;}
.boot-bar-track{
  width:min(420px,80vw);
  height:4px;border-radius:4px;
  background:rgba(255,255,255,.08);
  margin-top:1.4rem;overflow:hidden;
}
.boot-bar-fill{
  height:100%;width:0%;border-radius:4px;
  background:linear-gradient(90deg,var(--lavender),var(--amber));
  transition:width .25s ease;
}
.boot-pct{
  font-family:var(--font-display);
  font-size:.72rem;color:var(--text-dim);margin-top:.6rem;letter-spacing:.08em;
}
@keyframes logIn{to{opacity:1;transform:translateY(0);}}

/* ============================================================
   DESKTOP
   ============================================================ */
#desktop{
  position:fixed;inset:0;
  opacity:0;
  transition:opacity .7s ease;
}
#desktop.visible{opacity:1;}

#wallpaper{position:fixed;inset:0;z-index:0;transition:background 1s ease;}
.wp-blueprint{
  background:
    radial-gradient(circle at 18% 20%, rgba(242,166,90,.16), transparent 38%),
    radial-gradient(circle at 82% 78%, rgba(157,141,241,.18), transparent 40%),
    linear-gradient(var(--void),var(--void));
  background-color:var(--void);
}
.wp-blueprint::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size:42px 42px;
}
.wp-aurora{
  background:
    radial-gradient(circle at 20% 15%, rgba(157,141,241,.35), transparent 45%),
    radial-gradient(circle at 80% 20%, rgba(95,176,224,.3), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(242,166,90,.28), transparent 50%),
    var(--void);
}
.wp-void{ background:var(--void); }
.wp-void::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 40%, rgba(255,255,255,.05), transparent 60%);
}
.wp-matrix{ background:var(--void); }
.wp-matrix::after{
  content:'';position:absolute;inset:0;opacity:.5;
  background-image:repeating-linear-gradient(0deg, rgba(242,166,90,.05) 0px, rgba(242,166,90,.05) 1px, transparent 1px, transparent 26px);
}
#wallpaper::before{ /* scanline texture, always on, very subtle */
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0px, transparent 1px, transparent 3px);
  opacity:.18;
  mix-blend-mode:overlay;
}

/* ----- Desktop icons ----- */
#icons{
  position:absolute;top:22px;left:18px;right:18px;bottom:calc(var(--taskbar-h) + 16px);
  z-index:2;
  display:grid;
  grid-auto-flow:column;
  grid-template-rows:repeat(auto-fill,90px);
  grid-auto-columns:88px;
  gap:4px 12px;
  align-content:start;
}
.icon-btn{
  background:none;border:none;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:6px 4px;border-radius:10px;
  width:88px;
  opacity:0;transform:translateY(8px);
  animation:iconIn .45s ease forwards;
  transition:background .15s ease;
}
.icon-btn:hover, .icon-btn:focus-visible{ background:rgba(255,255,255,.06); }
.icon-btn:active{ background:rgba(255,255,255,.1); }
@keyframes iconIn{to{opacity:1;transform:translateY(0);}}
.folder-shape, .desktop-icon-img{ position:relative;width:54px;height:42px; transition:transform .2s ease; }
.desktop-icon-img{ object-fit:cover; border-radius:8px; }
.icon-btn:hover .folder-shape, .icon-btn:hover .desktop-icon-img{ transform:translateY(-3px); }
.folder-shape::before{
  content:'';position:absolute;top:0;left:3px;width:24px;height:9px;
  background:var(--c);border-radius:4px 4px 0 0;opacity:.95;
}
.folder-shape::after{
  content:'';position:absolute;top:7px;left:0;width:54px;height:35px;
  background:linear-gradient(155deg, var(--c) 0%, transparent 130%);
  opacity:.28;
  border:1.5px solid var(--c);border-radius:6px;
}
.folder-glyph{
  position:absolute;inset:7px 0 0 0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:.82rem;color:var(--c);
  pointer-events:none;
}
.icon-label{
  font-size:.74rem;text-align:center;line-height:1.2;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}

/* ============================================================
   WINDOWS
   ============================================================ */
#windows-layer{ position:absolute;top:0;left:0;right:0;bottom:var(--taskbar-h); z-index:10; pointer-events:none; }
.window{
  position:absolute;
  display:flex;flex-direction:column;
  background:color-mix(in srgb, var(--surface) 88%, transparent);
  backdrop-filter:blur(22px) saturate(140%);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-window);
  overflow:hidden;
  min-width:280px;min-height:200px;
  opacity:1;
  transition:box-shadow .2s ease, border-color .2s ease;
  pointer-events:auto;
}
.window.opening{ animation:winOpen .28s cubic-bezier(.2,.9,.3,1.2) forwards; }
@keyframes winOpen{
  0% { opacity: 0; transform: scale(.92) translateY(10px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
.window.closing{ animation:winClose .18s ease forwards; }
@keyframes winClose{ to{opacity:0;transform:scale(.92) translateY(8px);} }
.window.minimized{ display:none; }
.window.active{ border-color:rgba(242,166,90,.35); box-shadow:var(--shadow-window), 0 0 0 1px rgba(242,166,90,.18); }
.window.maximized{
  position:fixed !important; top:0 !important; left:0 !important;
  width:100vw !important; height:calc(100vh - var(--taskbar-h)) !important;
  border-radius:0;
}

.win-titlebar{
  flex:0 0 auto;display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.02);
  cursor:grab;user-select:none;touch-action:none;
}
.win-titlebar:active{cursor:grabbing;}
.win-icon-chip{
  width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:.74rem;font-family:var(--font-display);font-weight:700;flex:0 0 auto;
}
.win-title{ font-size:.84rem;font-weight:600;flex:1 1 auto;letter-spacing:.01em; }
.win-controls{ display:flex;gap:6px;flex:0 0 auto; }
.win-btn{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--line);
  background:rgba(255,255,255,.03);color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;font-size:.78rem;line-height:1;
  transition:background .15s ease,color .15s ease,border-color .15s ease;
}
.win-btn:hover{ background:rgba(255,255,255,.08); color:var(--text); }
.win-btn.close-btn:hover{ background:rgba(226,96,79,.18); color:var(--danger); border-color:rgba(226,96,79,.4); }

.win-body{ flex:1 1 auto;overflow-y:auto;padding:22px 24px 28px; scrollbar-width:thin; }
.win-body::-webkit-scrollbar{width:8px;}
.win-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px;}

/* ----- shared content styles ----- */
.win-section h3{ font-size:1.15rem;margin:0 0 8px; font-weight:700; }
.win-section h4{ font-size:.84rem;margin:20px 0 6px;color:var(--amber);text-transform:uppercase;letter-spacing:.07em; }
.win-section p{ font-size:.92rem;line-height:1.65;color:var(--text-dim);margin:0 0 8px; }

/* About */
.about-grid{ display:flex;gap:28px;flex-wrap:wrap; }
.avatar-wrap{ flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:10px;width:140px; }
.avatar-ring{ width:120px;height:120px;border-radius:50%;padding:4px;
  background:conic-gradient(from 0deg, var(--amber), var(--lavender), var(--sky), var(--amber)); }
.avatar{ width:100%;height:100%;border-radius:50%;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
  font-size:2.2rem;font-weight:700;color:var(--text); }
.avatar-caption{ font-size:.78rem;color:var(--text-dim);text-align:center; }
.about-text{ flex:1 1 280px;min-width:0; }
.wave{ display:inline-block;animation:wave 2.4s ease-in-out infinite; }
@keyframes wave{0%,100%{transform:rotate(0);}15%{transform:rotate(16deg);}30%{transform:rotate(-8deg);}45%{transform:rotate(16deg);}60%{transform:rotate(0);}}

/* Skills */
.skill-cats{ display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px; }
.skill-cat-title{ display:flex;align-items:center;gap:8px;font-size:.86rem;font-weight:700;margin-bottom:14px; }
.skill-cat-dot{ width:8px;height:8px;border-radius:50%; }
.skill-row{ margin-bottom:14px; }
.skill-row-top{ display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:6px; }
.skill-row-top span:last-child{ color:var(--text-dim);font-family:var(--font-display);font-size:.74rem; }
.skill-bar-track{ height:7px;border-radius:5px;background:rgba(255,255,255,.07);overflow:hidden; }
.skill-bar-fill{ height:100%;border-radius:5px;width:0%;transition:width 1s cubic-bezier(.2,.7,.2,1); }

/* Hobbies */
.hobby-grid{ display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px; }
.hobby-card{
  background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;
  padding:18px 14px;text-align:center;transition:transform .22s ease,border-color .22s ease,background .22s ease;
}
.hobby-card:hover{ transform:translateY(-5px) scale(1.02);border-color:rgba(242,166,90,.35);background:rgba(255,255,255,.05); }
.hobby-icon{ font-size:1.8rem;margin-bottom:8px;display:block; }
.hobby-card h5{ font-size:.86rem;margin:0 0 4px; }
.hobby-card p{ font-size:.76rem;color:var(--text-dim);margin:0;line-height:1.5; }

/* Projects */
.project-grid{ display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px; }
.project-card{
  border:1px solid var(--line);border-radius:14px;overflow:hidden;
  background:rgba(255,255,255,.025);
  display:flex;flex-direction:column;
  transition:transform .2s ease, border-color .2s ease;
}
.project-card:hover{ transform:translateY(-4px); border-color:rgba(157,141,241,.4); }
.project-thumb{
  height:120px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0 10px, transparent 10px 20px),
    linear-gradient(135deg, var(--p1), var(--p2));
}
.project-info{ padding:16px;display:flex;flex-direction:column;gap:8px;flex:1; }
.project-info h5{ margin:0;font-size:.96rem; }
.project-info p{ margin:0;font-size:.8rem;color:var(--text-dim);line-height:1.55;flex:1; }
.tech-tags{ display:flex;flex-wrap:wrap;gap:6px; }
.tech-tag{ font-size:.66rem;font-family:var(--font-display);padding:3px 8px;border-radius:6px;
  background:rgba(255,255,255,.06);color:var(--text-dim);border:1px solid var(--line); }
.project-links{ display:flex;gap:8px;margin-top:4px; }
.project-link{
  flex:1;text-align:center;font-size:.76rem;padding:8px 0;border-radius:8px;
  border:1px solid var(--line);text-decoration:none;color:var(--text);
  transition:background .15s ease,border-color .15s ease;
}
.project-link:hover{ background:rgba(255,255,255,.07);border-color:rgba(242,166,90,.4); }
.project-link.demo{ background:var(--amber-dim);border-color:rgba(242,166,90,.35); }

/* Contact */
.contact-wrap{ display:flex;gap:30px;flex-wrap:wrap; }
.contact-form{ flex:1 1 280px;display:flex;flex-direction:column;gap:12px;min-width:0; }
.field{ display:flex;flex-direction:column;gap:5px; }
.field label{ font-size:.76rem;color:var(--text-dim); }
.field input, .field textarea{
  background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;
  padding:10px 12px;color:var(--text);font-family:inherit;font-size:.88rem;resize:vertical;
}
.field input:focus, .field textarea:focus{ border-color:var(--amber); }
.submit-btn{
  margin-top:4px;padding:11px;border-radius:9px;border:none;
  background:linear-gradient(90deg,var(--amber),var(--coral));color:#1a1320;font-weight:700;font-size:.88rem;
  transition:transform .15s ease, opacity .15s ease;
}
.submit-btn:hover{ transform:translateY(-1px); }
.submit-btn:active{ transform:translateY(0); }
.success-panel{ display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:36px 10px;text-align:center; }
.success-check{
  width:54px;height:54px;border-radius:50%;background:rgba(111,207,151,.14);
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--mint);
  animation:popIn .35s cubic-bezier(.2,.9,.3,1.3);
}
@keyframes popIn{0%{transform:scale(.4);opacity:0;}100%{transform:scale(1);opacity:1;}}
.contact-side{ flex:0 0 auto;display:flex;flex-direction:column;gap:14px;min-width:160px; }
.social-row{ display:flex;gap:10px; }
.social-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--text);
  background:rgba(255,255,255,.03);transition:background .15s ease, transform .15s ease;
  text-decoration:none;
}
.social-btn:hover{ background:rgba(255,255,255,.08); transform:translateY(-2px); }
.contact-email{ font-family:var(--font-display);font-size:.8rem;color:var(--text-dim);word-break:break-all; }

/* ============================================================
   TASKBAR
   ============================================================ */
#taskbar{
  position:fixed;left:0;right:0;bottom:0;height:var(--taskbar-h);z-index:500;
  display:flex;align-items:center;gap:10px;padding:0 12px;
  background:color-mix(in srgb, var(--surface) 78%, transparent);
  backdrop-filter:blur(18px) saturate(140%);
  border-top:1px solid var(--line);
}
.power-btn{
  width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
  background:rgba(255,255,255,.04);color:var(--coral);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex:0 0 auto;
  transition:background .15s ease, box-shadow .15s ease;
}
.power-btn:hover{ background:rgba(226,96,79,.16); box-shadow:0 0 0 4px rgba(226,96,79,.1); }
.taskbar-divider{ width:1px;height:26px;background:var(--line);flex:0 0 auto; }
#tray{ flex:1 1 auto;display:flex;gap:6px;overflow-x:auto;min-width:0;scrollbar-width:none; }
#tray::-webkit-scrollbar{display:none;}
.tray-item{
  display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:9px;
  background:rgba(255,255,255,.03);border:1px solid transparent;color:var(--text-dim);
  font-size:.78rem;white-space:nowrap;flex:0 0 auto;max-width:160px;
  transition:background .15s ease,color .15s ease,border-color .15s ease;
}
.tray-item span.label{overflow:hidden;text-overflow:ellipsis;}
.tray-item.active{ background:rgba(242,166,90,.14);border-color:rgba(242,166,90,.3);color:var(--text); }
.tray-item:hover{ background:rgba(255,255,255,.08); }
.tray-close{
  margin-left: 6px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: .75rem;
  color: var(--text-dim);
  transition: background .15s ease, color .15s ease;
}
.tray-close:hover{
  background: rgba(226,96,79,.2);
  color: var(--danger);
}
.taskbar-right{ display:flex;align-items:center;gap:6px;flex:0 0 auto; }
.tb-icon-btn{
  width:36px;height:36px;border-radius:9px;border:1px solid transparent;background:none;color:var(--text-dim);
  display:flex;align-items:center;justify-content:center;font-size:.95rem;
  transition:background .15s ease,color .15s ease;
}
.tb-icon-btn:hover{ background:rgba(255,255,255,.06); color:var(--text); }
.clock-block{
  font-family:var(--font-display);text-align:right;line-height:1.15;padding:0 6px;min-width:64px;
}
.clock-time{ font-size:.84rem;font-weight:700; }
.clock-date{ font-size:.6rem;color:var(--text-dim); }

/* Wallpaper picker popover */
#wallpaper-picker{
  position:fixed;bottom:calc(var(--taskbar-h) + 10px);right:108px;z-index:520;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:12px;display:flex;gap:10px;box-shadow:var(--shadow-window);
}
.wp-swatch{
  width:46px;height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;
  position:relative;overflow:hidden;
}
.wp-swatch.selected{ border-color:var(--amber); }

/* ============================================================
   SHUTDOWN MODAL
   ============================================================ */
#shutdown-modal-backdrop{
  position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s ease;
}
#shutdown-modal-backdrop.show{ opacity:1;pointer-events:auto; }
.modal-card{
  width:min(320px,86vw);background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:24px 22px;text-align:center;box-shadow:var(--shadow-window);
  transform:scale(.92);transition:transform .2s ease;
}
#shutdown-modal-backdrop.show .modal-card{ transform:scale(1); }
.modal-icon{ font-size:1.8rem;margin-bottom:10px; }
.modal-card h4{ margin:0 0 6px;font-size:1.02rem; }
.modal-card p{ margin:0 0 18px;font-size:.82rem;color:var(--text-dim); }
.modal-actions{ display:flex;gap:10px; }
.modal-btn{ flex:1;padding:10px 0;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:.84rem;font-weight:600;color:var(--text); }

/* ============================================================

let audioCtx = null;
let soundOn = true;
function ensureAudio(){
  if (!soundOn) return null;
  try{
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }catch(e){ return null; }
}
function tone(freq, dur, type, vol, delay){
  const ctx = ensureAudio();
  if (!ctx) return;
  const t0 = ctx.currentTime + (delay || 0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(vol || 0.04, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}
const sfx = {
  boot:     () => { tone(440,.15,"sine",.05,0); tone(660,.15,"sine",.05,.12); tone(880,.25,"sine",.06,.24); },

function openWindow(id){
  if (openWindows[id]) {
    const w = openWindows[id];
    if (w.el.classList.contains("minimized")) restoreWindow(id);
    focusWindow(id);
    return;
  }
  const def = WINDOW_DEFS[id];
  const el = document.createElement("section");
  el.className = "window opening";
  el.setAttribute("role","dialog");
  el.setAttribute("aria-label", def.title);

  const isMobile = window.innerWidth <= 760;
  const w = Math.min(def.w, window.innerWidth - 24);
  const h = Math.min(def.h, window.innerHeight - 140);
  if (!isMobile){
    const offset = (cascadeIndex % 5) * 28;
    el.style.width = w + "px";
    el.style.height = h + "px";
    el.style.left = (60 + offset) + "px";
    el.style.top = (40 + offset) + "px";
  }
  cascadeIndex++;

  el.innerHTML =
    '<div class="win-titlebar" data-handle>' +
      '<span class="win-icon-chip" style="background:color-mix(in srgb, ' + def.color + ' 22%, transparent);color:' + def.color + '">' + def.glyph + '</span>' +
      '<span class="win-title">' + def.title + '</span>' +
      '<div class="win-controls">' +
        '<button class="win-btn min-btn" aria-label="Minimize">–</button>' +
        '<button class="win-btn max-btn" aria-label="Maximize">▢</button>' +
        '<button class="win-btn close-btn" aria-label="Close">×</button>' +
      '</div>' +
    '</div>' +
    '<div class="win-body">' + def.render() + '</div>';

  document.getElementById("windows-layer").appendChild(el);
  openWindows[id] = { el, maximized:false, prevRect:null };

  el.querySelector(".min-btn").addEventListener("click", () => minimizeWindow(id));
  el.querySelector(".max-btn").addEventListener("click", () => toggleMaximize(id));
  el.querySelector(".close-btn").addEventListener("click", () => closeWindow(id));
  el.addEventListener("pointerdown", () => focusWindow(id));
  makeDraggable(el, el.querySelector("[data-handle]"), id);

  addTrayItem(id, def);
  focusWindow(id);
  try{ sfx.open(); }catch(e){}

  if (id === "skills") setTimeout(() => animateSkillBars(el), 80);
  if (id === "contact") wireContactForm(el);
  if (id === "resume") setTimeout(() => toggleMaximize(id), 50);

  setTimeout(() => el.classList.remove("opening"), 320);
}

function focusWindow(id){
  Object.keys(openWindows).forEach(k => {
    openWindows[k].el.classList.toggle("active", k === id);
    const tray = document.getElementById("tray-" + k);
    if (tray) tray.classList.toggle("active", k === id);
  });
  const w = openWindows[id];
  if (w){ zCounter++; w.el.style.zIndex = zCounter; }
}

function minimizeWindow(id){
  const w = openWindows[id];
  if (!w) return;
  w.el.classList.add("minimized");
  const tray = document.getElementById("tray-" + id);
  if (tray) tray.classList.remove("active");
}

function restoreWindow(id){
  const w = openWindows[id];
  if (!w) return;
  w.el.classList.remove("minimized");
  focusWindow(id);
}

function toggleMaximize(id){
  const w = openWindows[id];
  if (!w) return;
  if (!w.maximized){
    w.prevRect = { left: w.el.style.left, top: w.el.style.top, width: w.el.style.width, height: w.el.style.height };
    w.el.classList.add("maximized");
    w.maximized = true;
  } else {
    w.el.classList.remove("maximized");
    if (w.prevRect){
      w.el.style.left = w.prevRect.left;
      w.el.style.top = w.prevRect.top;
      w.el.style.width = w.prevRect.width;
      w.el.style.height = w.prevRect.height;
    }
    w.maximized = false;
  }
  focusWindow(id);
}

function closeWindow(id){
  const w = openWindows[id];
  if (!w) return;
  w.el.classList.add("closing");
  try{ sfx.close(); }catch(e){}
  setTimeout(() => {
    w.el.remove();
    const tray = document.getElementById("tray-" + id);
    if (tray) tray.remove();
    delete openWindows[id];
  }, 190);
}

function addTrayItem(id, def){
  const tray = document.getElementById("tray");
  const item = document.createElement("button");
  item.className = "tray-item";
  item.id = "tray-" + id;
  item.innerHTML = '<span style="color:' + def.color + '">' + def.glyph + '</span><span class="label">' + def.title + '</span><span class="tray-close" aria-label="Close">×</span>';
  
  item.addEventListener("click", () => {
    const w = openWindows[id];
    if (!w) return;
    if (w.el.classList.contains("minimized")) { restoreWindow(id); return; }
    focusWindow(id);
  });

  const closeBtn = item.querySelector(".tray-close");
  closeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    try { sfx.click(); } catch(err) {}
    closeWindow(id);
  });

  tray.appendChild(item);
}

/* ----- Dragging (Pointer Events: mouse + touch) ----- */
function makeDraggable(el, handle, id){
  let dragging = false, startX, startY, startLeft, startTop;
  handle.addEventListener("pointerdown", (e) => {
    if (e.target.closest(".win-btn")) return;
    if (window.innerWidth <= 760) return;
    if (el.classList.contains("maximized")) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    const rect = el.getBoundingClientRect();
    startLeft = rect.left; startTop = rect.top;
    focusWindow(id);
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
  });
  handle.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    let newTop = startTop + dy;
    if (newTop < 0) newTop = 0;
    el.style.left = (startLeft + dx) + "px";
    el.style.top = newTop + "px";
  });
  ["pointerup","pointercancel"].forEach(evt => handle.addEventListener(evt, () => { dragging = false; }));
}

function wireContactForm(windowEl){
  const form = windowEl.querySelector("[data-contact-form]");
  if (!form) return;
  const submitBtn = form.querySelector(".submit-btn");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const originalBtnText = submitBtn.textContent;
    submitBtn.textContent = "Sending...";
    submitBtn.disabled = true;

    const nameVal = form.querySelector("#cf-name").value;
    const emailVal = form.querySelector("#cf-email").value;
    const msgVal = form.querySelector("#cf-msg").value;

    fetch("https://formsubmit.co/ajax/aa5fa2ffec7929c41222b00fd31b3b72", {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({
        _subject: "New Message from Portfolio: " + nameVal,
        _template: "table",
        name: nameVal,
        email: emailVal,
        message: msgVal
      })
    })
    .then(response => response.json())
    .then(data => {
      const wrap = form.parentElement;
      form.style.display = "none";
      const success = document.createElement("div");
      success.className = "success-panel";
      success.innerHTML = '<div class="success-check">✓</div><h5 style="margin:0;">Message sent!</h5><p style="color:var(--text-dim);font-size:.82rem;margin:0;">Thanks for reaching out — I\'ll get back to you soon.</p>';
      wrap.insertBefore(success, form);
    })
    .catch(err => {
      console.error(err);
      submitBtn.textContent = originalBtnText;
      submitBtn.disabled = false;
      alert("Oops! Something went wrong. Please try again or email me directly at " + CONFIG.email);
    });
  });
}

/* ============================================================
   TASKBAR: clock, theme, wallpaper, sound, power
   ============================================================ */
let clockInterval = null;
function restartClock(){
  if (clockInterval) clearInterval(clockInterval);
  function tick(){
    const now = new Date();
    document.getElementById("clock-time").textContent =
      now.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
    document.getElementById("clock-date").textContent =
      now.toLocaleDateString([], { weekday:"short", month:"short", day:"numeric" });
  }
  tick();
  clockInterval = setInterval(tick, 1000 * 30);
}

document.getElementById("theme-toggle").addEventListener("click", (e) => {
  const html = document.documentElement;
  const isLight = html.getAttribute("data-theme") === "light";
  html.setAttribute("data-theme", isLight ? "dark" : "light");
  e.currentTarget.textContent = isLight ? "🌙" : "☀️";
  try{ sfx.click(); }catch(err){}
});

document.getElementById("sound-toggle").addEventListener("click", (e) => {
  soundOn = !soundOn;
  e.currentTarget.textContent = soundOn ? "🔊" : "🔇";
  if (soundOn) { try{ sfx.click(); }catch(err){} }
});

const wpPicker = document.getElementById("wallpaper-picker");
document.getElementById("wallpaper-btn").addEventListener("click", () => {
  wpPicker.classList.toggle("hidden");
});
wpPicker.querySelectorAll(".wp-swatch").forEach(sw => {
  sw.addEventListener("click", () => {
    const target = sw.dataset.wp;
    const wallpaperEl = document.getElementById("wallpaper");
    wallpaperEl.className = target;
    wpPicker.querySelectorAll(".wp-swatch").forEach(s => s.classList.remove("selected"));
    sw.classList.add("selected");
    try{ sfx.click(); }catch(err){}
  });
});
document.addEventListener("click", (e) => {
  if (!wpPicker.contains(e.target) && e.target.id !== "wallpaper-btn"){
    wpPicker.classList.add("hidden");
  }
});

/* ----- Power / Shutdown flow ----- */
const shutdownBackdrop = document.getElementById("shutdown-modal-backdrop");
document.getElementById("power-btn").addEventListener("click", () => {
  shutdownBackdrop.classList.add("show");
});
document.getElementById("cancel-shutdown").addEventListener("click", () => {
  shutdownBackdrop.classList.remove("show");
});
document.getElementById("confirm-shutdown").addEventListener("click", () => {
  shutdownBackdrop.classList.remove("show");
  doShutdown();
});
shutdownBackdrop.addEventListener("click", (e) => {
  if (e.target === shutdownBackdrop) shutdownBackdrop.classList.remove("show");
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && shutdownBackdrop.classList.contains("show")) {
    shutdownBackdrop.classList.remove("show");
  }
});

function doShutdown(){
  localStorage.setItem("portfolio_shutdown", "true");
  try{ sfx.shutdown(); }catch(e){}
  const desktop = document.getElementById("desktop");
  desktop.classList.add("shutting-down");
  if (clockInterval) clearInterval(clockInterval);
  setTimeout(() => {
    desktop.style.display = "none";
    const ty = document.getElementById("thankyou-screen");
    ty.classList.add("show");
  }, 560);
}

document.getElementById("restart-btn").addEventListener("click", () => {
  localStorage.removeItem("portfolio_shutdown");
  window.location.reload();
});

/* ============================================================

   ============================================================ */
if (localStorage.getItem("portfolio_shutdown") === "true") {
  document.getElementById("boot-screen").style.display = "none";
  document.getElementById("desktop").style.display = "none";
  document.getElementById("thankyou-screen").classList.add("show");
